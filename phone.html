<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>OTP</title>
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
  </head>
  <body>
	  
    <div id="holder" style="max-width:240px;margin: auto;">
      <div id="done"></div>
      <h2>OTP Sign Up</h2>
      Phone Number:<br>
      <input type="tel" id="phoneNumber" class="w3-input w3-border w3-round-large" style="width:200px" /><br>
      <button id="sign-in-button" onclick="submitPhoneNumberAuth()" class="w3-btn w3-ripple w3-blue w3-round-large" style="width:200px">
        SIGN IN WITH PHONE
      </button><br><br><br>

      <div id="recaptcha-container"></div><br><br>

      OTP Code:<br>
      <input type="text" id="code" class="w3-input w3-border w3-round-large" style="width:200px" /><br>
      <button id="confirm-code" onclick="submitPhoneNumberAuthCode()" class="w3-btn w3-ripple w3-blue w3-round-large" style="width:200px">
        ENTER CODE
      </button>
      <p id="notes" style="max-width:200px;word-wrap: break-word;">
        1. Enter phone number with + and country code, then click Sign In with Phone<br>
        2. Complete the recaptcha<br>
        3. Get the OTP code from your SMS and type/paste it in, then click Enter Code
      </p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <script>
      // Firebase configuration
      var firebaseConfig = {
    apiKey: "AIzaSyCgy_AToJkB7iIkAf8A9yKYLGRcn6q3DGc", 
    authDomain: "mypro-f9c43.firebaseapp.com",
    databaseURL: "https://mypro-f9c43-default-rtdb.firebaseio.com",
    projectId: "mypro-f9c43",
    storageBucket: "mypro-f9c43.appspot.com",
    messagingSenderId: "457342163754",
    appId: "1:457342163754:web:9f428caeea9ad5c5d11c53",
    measurementId: "G-YS7GD676WC"
};

      // Initialize Firebase
      firebase.initializeApp(firebaseConfig);

      // Initialize reCaptcha verifier
      window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
        size: 'normal',
        callback: function(response) {
          console.log('reCaptcha resolved');
        }
      });

      function submitPhoneNumberAuth() {
        var phoneNumber = document.getElementById("phoneNumber").value;
        var appVerifier = window.recaptchaVerifier;

        firebase.auth().signInWithPhoneNumber(phoneNumber, appVerifier)
          .then(function(confirmationResult) {
            window.confirmationResult = confirmationResult;
            console.log('OTP sent');
          })
          .catch(function(error) {
            console.error('Error during signInWithPhoneNumber', error);
            alert(error.message);
          });
      }

      function submitPhoneNumberAuthCode() {
        var code = document.getElementById("code").value;

        window.confirmationResult.confirm(code)
          .then(function(result) {
            var user = result.user;
            document.getElementById("done").innerHTML = "OTP completed";
            console.log('User signed in successfully', user);
          })
          .catch(function(error) {
            console.error('Error during confirmation', error);
            alert(error.message);
            document.getElementById("done").innerHTML = "Error: " + error.message;
          });
      }

      firebase.auth().onAuthStateChanged(function(user) {
        if (user) {
          console.log("USER LOGGED IN");
        } else {
          console.log("USER NOT LOGGED IN");
        }
      });
    </script>
  </body>
</html>
