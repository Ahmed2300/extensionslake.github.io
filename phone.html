<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phone Authentication</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap">
  <style>
    /* ... (same CSS as before) ... */
  </style>
</head>
<body>
  <div class="container">
    <h2>Phone Verification</h2>

    <div id="phone-form">
      <label for="phoneNumber">Enter your phone number:</label>
      <div class="input-group">
        <select id="countryCode">
          <option value="+1">+1 (US)</option>
          <option value="+44">+44 (UK)</option>
          <option value="+91">+91 (IN)</option>
          <option value="+61">+61 (AU)</option>
          <option value="+20" selected>+20 (EG)</option>
          <!-- Add more countries as needed -->
        </select>
      </div>
      <div class="input-group">
        <input type="tel" id="phoneNumber" placeholder="1234567890" inputmode="numeric">
        <i class="material-icons">phone</i>
      </div>
      <button onclick="sendOTP()">Send OTP</button>
    </div>

    <div id="verification-container">
      <label for="otp">Enter OTP:</label>
      <div class="input-group">
        <input type="text" id="otp" placeholder="Enter 6-digit code" inputmode="numeric" maxlength="6">
        <i class="material-icons">lock</i>
      </div>
      <button onclick="verifyOTP()">Verify OTP</button>
    </div>

    <p id="message"></p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script>
    // Firebase configuration (replace with your own)
    var firebaseConfig = {
      // ... your firebase config ... 
    };

    firebase.initializeApp(firebaseConfig);

    let windowConfirmationResult = null;
    const countryCodeInput = document.getElementById("countryCode");
    const phoneNumberInput = document.getElementById("phoneNumber");
    const otpInput = document.getElementById("otp");
    const messageElement = document.getElementById("message");
    const phoneForm = document.getElementById("phone-form");
    const verificationContainer = document.getElementById("verification-container");

    function sendOTP() {
      const countryCode = countryCodeInput.value;
      const phoneNumber = phoneNumberInput.value;
      const fullPhoneNumber = countryCode + phoneNumber;

      firebase.auth().signInWithPhoneNumber(fullPhoneNumber)
        .then(function(confirmationResult) {
          window.confirmationResult = confirmationResult;
          messageElement.textContent = "OTP sent!";
          phoneForm.style.display = "none";
          verificationContainer.style.display = "block";
        })
        .catch(function(error) {
          messageElement.textContent = `Error: ${error.message}`;
        });
    }

    function verifyOTP() {
      const otp = otpInput.value;

      if (window.confirmationResult) {
        window.confirmationResult.confirm(otp)
          .then(function(result) {
            const user = result.user;
            messageElement.textContent = "You are logged in successfully!";
          })
          .catch(function(error) {
            messageElement.textContent = `Error: ${error.message}`;
          });
      }
    }
  </script>
</body>
</html>
