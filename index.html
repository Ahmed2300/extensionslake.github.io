body.dark-theme {
  --background-color: #343a40;
  --text-color: #f8f9fa;
  --card-background: #21252b;
  --card-border: #343a40;
  --shadow-color: rgba(255, 255, 255, 0.1);
  --primary-color: #6FDCE3;
  --card-bg-1: #4b5563;
  --card-bg-2: #374151;
  --card-bg-3: #4338ca;
  --card-bg-4: #1d4ed8;
  --card-bg-5: #0ea5e9;
  --card-bg-6: #4d7c0f;
  --card-bg-7: #a16207;
  --card-bg-8: #8b5cf6;
  --card-bg-9: #d946ef;
  --card-bg-10: #ec4899;
  --card-bg-11: #f43f5e;
  --card-bg-12: #dc2626;
  --card-bg-13: #a855f7;
  --card-bg-14: #06b6d4;
  --card-bg-15: #a78bfa;
  --card-bg-16: #f87171;
  --card-bg-17: #fb923c;
  --card-bg-18: #facc15;
  --card-bg-19: #a3e635;
  --card-bg-20: #4ade80;
}

header {
  background-color: var(--background-color);
  padding: 20px 0;
  width: 100%;
  box-shadow: 0 2px 5px var(--shadow-color);
}

.header-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

.logo {
  display: flex;
  align-items: center;
}

.logo img {
  margin-right: 10px;
}

nav ul {
  list-style: none;
  margin: 0;
  padding: 0;
  display: flex;
}

nav li {
  margin-left: 30px;
}

nav a {
  text-decoration: none;
  color: var(--text-color);
  font-weight: 500;
  transition: color 0.3s ease;
  position: relative;
  padding-bottom: 5px;
}

nav a:hover {
  color: var(--primary-color);
}

nav a.active {
  color: var(--primary-color);
}

nav a::before {
  content: "";
  position: absolute;
  width: 0%;
  height: 2px;
  bottom: 0;
  left: 0;
  background-color: var(--primary-color);
  transition: width 0.3s ease;
}

nav a:hover::before {
  width: 100%;
}

.container {
  background-color: var(--card-background);
  padding: 30px;
  border-radius: 8px;
  box-shadow: 0 4px 8px var(--shadow-color);
  margin: 50px auto;
  text-align: center;
  width: 80%;
  max-width: 1200px;
}

h1 {
  color: var(--primary-color);
  margin-bottom: 20px;
}

#productsContainer {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  overflow-y: auto;
  max-height: 80vh;
  padding: 10px;
}

.product-card {
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 20px;
  text-align: left;
  position: relative;
  background-color: var(--card-background);
  box-shadow: 0 2px 4px var(--shadow-color);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.product-card:hover {
  transform: translateY(-5px);
  box-shadow: 0 4px 8px var(--shadow-color);
}

.publisher-info {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.publisher-image {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  margin-right: 10px;
}

.publisher-name {
  font-weight: 600;
  display: flex;
  align-items: center;
}

.verified-icon {
  color: var(--primary-color);
  font-size: 1.2em;
  margin-left: 5px;
}

.publish-date {
  font-style: italic;
  color: #6c757d;
  font-size: 0.8em;
  margin-left: 10px;
}

h2 {
  color: var(--text-color);
  margin-bottom: 10px;
}

p {
  line-height: 1.6;
  color: var(--text-color);
}

button {
  background-color: var(--primary-color);
  color: #ffffff;
  border: none;
  padding: 10px 20px;
  border-radius: 5px;
  cursor: pointer;
  font-family: inherit;
  transition: background-color 0.3s ease;
  margin-bottom: 5px;
  display: block;
  text-align: left;
  text-decoration: none;
  width: 100%;
  box-shadow: 0px 2px 4px var(--shadow-color);
}

button:hover {
  background-color: darken(var(--primary-color), 10%);
}

.search-and-filters {
  display: flex;
  flex-direction: column;
  align-items: stretch;
  margin-bottom: 20px;
}

.search-box {
  margin-bottom: 10px;
}

input[type="text"] {
  padding: 10px;
  border: 1px solid #ced4da;
  border-radius: 5px;
  width: 100%;
  font-family: inherit;
  box-shadow: 0px 2px 4px var(--shadow-color);
}

.filter-group {
  display: flex;
  align-items: center;
  margin-bottom: 10px;
}

.filter-group label {
  margin-right: 10px;
  font-weight: bold;
}

.filter-group select,
.filter-group input[type="number"] {
  padding: 8px;
  border: 1px solid #ced4da;
  border-radius: 5px;
  box-shadow: 0px 2px 4px var(--shadow-color);
}

.type-indicator {
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 5px 10px;
  border-radius: 20px;
  color: white;
  font-weight: bold;
  cursor: pointer;
  z-index: 1;
  box-shadow: 0px 2px 4px var(--shadow-color);
}

.type-indicator.free {
  background-color: #28a745;
}

.type-indicator.paid {
  background-color: #ffc107;
}

.info-dialog {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 80%;
  max-width: 500px;
  background-color: var(--card-background);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 20px;
  box-shadow: 0 4px 8px var(--shadow-color);
  text-align: left;
  z-index: 100;
}

.dialog-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-color: rgba(0, 0, 0, 0.5);
  z-index: 99;
}

.info-dialog h3 {
  color: var(--primary-color);
  margin-bottom: 10px;
}

.info-dialog p {
  color: var(--text-color);
  margin-bottom: 15px;
}

.info-dialog button {
  background-color: var(--primary-color);
  color: #ffffff;
  border: none;
  padding: 10px 15px;
  border-radius: 5px;
  cursor: pointer;
  font-family: inherit;
  transition: background-color 0.3s ease;
}

.info-dialog button:hover {
  background-color: darken(var(--primary-color), 10%);
}

.theme-switcher {
  position: absolute;
  top: 20px;
  right: 20px;
  display: flex;
  align-items: center;
}

.theme-switcher label {
  margin-right: 10px;
  color: var(--text-color);
}

.theme-switcher input[type="checkbox"] {
  appearance: none;
  width: 40px;
  height: 20px;
  background: #ccc;
  border-radius: 20px;
  position: relative;
  cursor: pointer;
}

.theme-switcher input:checked {
  background: var(--primary-color);
}

.theme-switcher input:before {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 16px;
  height: 16px;
  background: #fff;
  border-radius: 50%;
  transition: 0.3s;
}

.theme-switcher input:checked:before {
  transform: translateX(20px);
}

footer {
      background-color: var(--footer-background); 
      text-align: center;
      padding: 20px 0;
      margin-top: 50px; 
      width: 100%;
    }

  color: white
}

.auth-buttons {
  display: flex;
  align-items: center;
}

.auth-buttons button {

}

.auth-buttons button:hover {
  background-color: darken(var(--secondary-color), 10%);
}

@media (max-width: 992px) {
  .container {
    width: 90%;

  .extension-image {

  }

  .search-and-filters {

  }

  .filter-group {
    flex-direction: column;
    align-items: flex-start;
    margin-bottom: 8px;
  }

  .filter-group label {
    margin-bottom: 3px;
  }
}

@media (max-width: 576px) {
  .header-content {
    flex-direction: column;

    margin-bottom: 10px;

  nav ul {
    flex-direction: column;
    align-items: center;

  nav li {

  h1 {

  .product-card h2 {

  .button-group {

    align-items: stretch;

  .button-group button {

  }

  .info-dialog {
    width: 95%;
  }
}

.loading-animation {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 200px;
}

.loading-animation div {
  width: 10px;
  height: 10px;
  background-color: var(--primary-color);
  margin: 0 5px;
  border-radius: 50%;
  animation: bounce 1s infinite ease-in-out;
}

.loading-animation .dot1 {
  animation-delay: 0.1s;
}

.loading-animation .dot2 {
  animation-delay: 0.2s;
}

.loading-animation .dot3 {
  animation-delay: 0.3s;
}

@keyframes bounce {
  0%, 100% {
    transform: translateY(0);
  }

  50% {
    transform: translateY(-10px);
  }
}

.extension-image {

    const databaseURL = "https://mypro-f9c43-default-rtdb.firebaseio.com/";
    const apiKey = "AIzaSyBfDYW18AJSfb03Cm_lR-SCZpTbcnLH1Qk"; 
    const signInBtn = document.getElementById("signInBtn");
    const signUpBtn = document.getElementById("signUpBtn");
    const authButtons = document.getElementById("authButtons");
    const signupDialog = document.getElementById("signupDialog");
    const userCard = document.getElementById("userCard");
    const googleSignInButton = document.getElementById('googleSignInButton');
    let allProducts = [];
    const maxDescriptionLength = 150;
    let currentUser = null;
  
    async function googleSignIn() {
      const provider = new GoogleAuthProvider();
      try {
        const result = await signInWithPopup(auth, provider);
        currentUser = result.user;
        localStorage.setItem('currentUser', JSON.stringify(currentUser));
        signupDialog.style.display = "none";
        dialogOverlay.style.display = "none";
        updateAuthDisplay();
        fetchProducts();
      } catch (error) {
        console.error("Error signing in with Google:", error);
      }
    }
  
    function fetchProducts() {
      fetch(`${databaseURL}/.json?auth=${apiKey}`)
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.json();
        })
        .then(data => {
          allProducts = data;
          displayProducts(allProducts);
        })
        .catch(error => {
          console.error('There has been a problem with your fetch operation:', error);
          productsContainer.innerHTML = '<p>Error loading products. Please try again later.</p>';
        });
    }
  
    function displayProducts(productsToDisplay) {
      productsContainer.innerHTML = '';
  
      const productKeys = Object.keys(productsToDisplay);
  
      productKeys.forEach((productId, index) => {
        const product = productsToDisplay[productId];
        if (!product.list_of_hearers) {
          product.list_of_hearers = [];
        }
  
        let buttonText = product.type === "paid" ? "Buy Now" : "Download Now";
        let buttonUrl = product.type === "paid" ? product.paymentUrl : product.paymentUrl;
        let verifiedIcon = product.isVerified
            ? `<span class="material-icons verified-icon">verified</span>`
            : '';
        let imageElement = document.createElement(product.coverImageURL.endsWith('.gif') ? 'img' : 'img');
        imageElement.src = product.coverImageURL;
        imageElement.alt = `${product.name} Cover`;
        let extensionImageContainer = document.createElement('div');
        extensionImageContainer.classList.add('extension-image');
        extensionImageContainer.appendChild(imageElement);
        const truncatedDescription = truncateDescription(product.description, maxDescriptionLength);
        const heartCount = product.Heart_Num || 0;
        
        let heartIcon = 'favorite_border';
        let heartColor = ''; 
        if (currentUser && product.list_of_hearers.includes(currentUser.uid)) {
          heartIcon = 'favorite';
          heartColor = 'style="color: #FF6969;"'; 
        }
  
        const productCard = `
          <div class="product-card" data-type="${product.type}" data-product-id="${productId}" style="background-color: var(--card-bg-${(index % 20) + 1});">
            <div class="type-indicator ${product.type}" data-type="${product.type}">${product.type.toUpperCase()}</div>
            <div class="publisher-info">
              <img class="publisher-image" src="${product.publisherImageURL}" alt="Publisher Image">
              <div>
                <span class="publisher-name">${product.publisherName} ${verifiedIcon}</span>
                <p class="publish-date">${product.date}</p>
              </div>
            </div>
            ${extensionImageContainer.outerHTML} 
            <h2>${product.name}</h2>
            <div class="description-container">
              <p class="description-text">${truncatedDescription}</p>
              <span class="read-more" style="color: var(--primary-color); cursor: pointer;">Read More</span> 
            </div>
            <p>Price: $${product.price.toFixed(2)}</p>
            <div class="button-group">
              <a href="${buttonUrl}" target="_blank">
                <button>${buttonText}</button>
              </a>
              <a href="${product.topicURL}" target="_blank">
                <button style="background-color: #FF9843;">Visit Official Topic</button> 
              </a>
            </div>
            <span class="heart-icon material-icons" onclick="toggleHeart(this)" ${heartColor}>${heartIcon}</span>
            <span class="heart-count">${heartCount}</span>
          </div>
        `;
        productsContainer.innerHTML += productCard;
      });
  
      const typeIndicators = document.querySelectorAll('.type-indicator');
      typeIndicators.forEach(indicator => {
        indicator.addEventListener('click', showInfoDialog);
      });
  
      const descriptionTexts = document.querySelectorAll('.description-text');
      descriptionTexts.forEach(textElement => {
        textElement.innerHTML = truncateDescription(textElement.textContent, maxDescriptionLength);
      });
  
      const heartIcons = document.querySelectorAll('.heart-icon');
      heartIcons.forEach(icon => {
        icon.addEventListener('click', () => {
          if (currentUser) {
            toggleHeart(icon);
          } else {
            alert('Please sign in to interact with hearts.');
          }
        });
      });
  
      const readMoreSpans = document.querySelectorAll('.read-more');
      readMoreSpans.forEach(span => {
        span.addEventListener('click', () => {
          showFullDescription(span);
        });
      }); 
    }
  
    function showInfoDialog(event) {
      const type = event.target.dataset.type;
      let dialogTitle, dialogMessage;
      if (type === 'free') {
        dialogTitle = 'Free Product';
        dialogMessage = 'This product is free! You can download it directly by clicking "Download Now."';
      } else if (type === 'paid') {
        dialogTitle = 'Paid Product';
        dialogMessage = 'This product is paid. Please proceed to checkout to make a purchase.';
      }
      infoDialog.querySelector('h3').textContent = dialogTitle;
      infoDialog.querySelector('p').textContent = dialogMessage;
      infoDialog.style.display = 'block';
      dialogOverlay.style.display = 'block';
    }
  
    closeDialogButton.addEventListener('click', () => {
      infoDialog.style.display = 'none';
      dialogOverlay.style.display = 'none';
    });
  
    dialogOverlay.addEventListener('click', () => {
      signupDialog.style.display = "none";
      infoDialog.style.display = 'none';
      dialogOverlay.style.display = 'none';
    });
  
    function showFullDescription(element) {
      const card = element.closest('.product-card');
      const productName = card.querySelector('h2').textContent;
      const productId = card.dataset.productId; 
      const fullDescription = allProducts[productId].description; 
  
      dialogTitle.textContent = productName;
      dialogDescription.textContent = fullDescription;
      infoDialog.style.display = 'block'; 
      dialogOverlay.style.display = 'block'; 
    }
  
    function truncateDescription(description, maxLength) {
      if (description.length > maxLength) {
        return description.substring(0, maxLength) + '... ';
      }
      return description;
    }
  
    function toggleHeart(icon) {
      if (!currentUser) {
        alert('Please sign in to interact with hearts.');
        return;
      }
  
      const card = icon.closest('.product-card');
      const productId = card.dataset.productId;
      const heartCountSpan = card.querySelector('.heart-count');
      let currentCount = parseInt(heartCountSpan.textContent, 10);
      const product = allProducts[productId]; 
  
      const userIndex = product.list_of_hearers.indexOf(currentUser.uid);
  
      if (userIndex === -1) {
        product.list_of_hearers.push(currentUser.uid);
        icon.textContent = 'favorite';
        icon.style.color = '#FF6969'; 
        currentCount++;
      } else {
        product.list_of_hearers.splice(userIndex, 1);
        icon.textContent = 'favorite_border';
        icon.style.color = ''; 
        currentCount--;
      }
  
      heartCountSpan.textContent = currentCount;
      product.Heart_Num = currentCount; 
  
      updateProductInDatabase(productId, product);
    }
  
    function updateProductInDatabase(productId, updatedProduct) {
      fetch(`${databaseURL}/${productId}.json?auth=${apiKey}`, {
        method: 'PATCH',
        body: JSON.stringify(updatedProduct), 
        headers: {
          'Content-type': 'application/json; charset=UTF-8'
        }
      })
      .then(response => {
        if (!response.ok) {
          throw new Error('Network response was not ok');
        }
        console.log('Product updated successfully!');
      })
      .catch(error => {
        console.error('There has been a problem updating the product:', error);
      });
    }
  
  
    fetchProducts();
  
    searchInput.addEventListener("input", () => {
      applyFilters();
    });
  
    typeFilter.addEventListener('change', () => {
      priceFilterGroup.style.display = (typeFilter.value === 'paid') ? 'flex' : 'none';
      applyFilters();
    });
  
    dateFilter.addEventListener('change', applyFilters);

    minPriceInput.addEventListener('input', applyFilters);
    maxPriceInput.addEventListener('input', applyFilters);
  
    function applyFilters() {
      const searchTerm = searchInput.value.toLowerCase();
      const selectedType = typeFilter.value;
      const minPrice = parseFloat(minPriceInput.value) || 0;
      const maxPrice = parseFloat(maxPriceInput.value) || Infinity;
  
      const filteredProducts = Object.fromEntries( 
        Object.entries(allProducts).filter(([productId, product]) => {
          const matchesType = selectedType === 'all' || product.type === selectedType;
          const matchesPrice = product.price >= minPrice && product.price <= maxPrice;
          const matchesSearch = product.name.toLowerCase().includes(searchTerm) ||
                 product.description.toLowerCase().includes(searchTerm);
          return matchesType && matchesPrice && matchesSearch;
        })
      );
  
      displayProducts(filteredProducts); 
    }
  
    themeToggle.addEventListener('change', () => {
      document.body.classList.toggle('dark-theme', themeToggle.checked);
  
      if (themeToggle.checked) {
        document.documentElement.style.setProperty('--footer-background', '#343a40');
        document.documentElement.style.setProperty('--footer-text', 'white');
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.style.setProperty('--footer-background', 'black');
        document.documentElement.style.setProperty('--footer-text', 'white');
        localStorage.setItem('theme', 'light');
      }
    });
  
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-theme');
      themeToggle.checked = true;
    }
  
    signInBtn.addEventListener("click", () => {
      signupDialog.style.display = "block";
      dialogOverlay.style.display = "block";
    });
  
    signUpBtn.addEventListener("click", () => {
      signupDialog.style.display = "block";
      dialogOverlay.style.display = "block";
    });
  
    googleSignInButton.addEventListener('click', googleSignIn);
  
    function updateAuthDisplay() {
      if (currentUser) {
        authButtons.style.display = "none";
        userCard.innerHTML = `
          <div class="user-card">
            <img src="${currentUser.photoURL || 'https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y'}" alt="User Profile Picture">
            <h3>${currentUser.displayName || currentUser.email.split('@')[0]}</h3>
            <p>${currentUser.email}</p>
            <button id="logoutBtn">Logout</button>
            <a href="add new product.html"> 
              <button id="addNewProductBtn" style="background-color: #50B498;">Add New Product</button>
            </a>
          </div>
        `;

        const logoutBtn = document.getElementById('logoutBtn');
        const addNewProductBtn = document.getElementById('addNewProductBtn');

        logoutBtn.addEventListener('click', () => {
          localStorage.removeItem('currentUser');
          currentUser = null;
          updateAuthDisplay(); 
          fetchProducts();
        });
      } else {
        authButtons.style.display = "flex";
        userCard.innerHTML = ""; 
      }
    }
  
    updateAuthDisplay();
    window.addEventListener('load', () => {
      const cachedUser = localStorage.getItem('currentUser');
      if (cachedUser) {
        currentUser = JSON.parse(cachedUser);
        updateAuthDisplay();
        fetchProducts(); 
      }
    });
  </script>

</body>
</html>
