      --card-bg-7: #fff0f5;

      --card-bg-9: #add8e6;

      --card-bg-14: #f0ffff;

    }

    header {
      background-color: var(--background-color);
      padding: 20px 0;
      width: 100%;
      box-shadow: 0 2px 5px var(--shadow-color);
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .logo {
      display: flex;
      align-items: center;
    }

    .logo img {
      margin-right: 10px;
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
    }

    nav li {
      margin-left: 30px;
    }

    nav a {
      text-decoration: none;
      color: var(--text-color);
      font-weight: 500;
      transition: color 0.3s ease;
      position: relative;
      padding-bottom: 5px;
    }

    nav a:hover {
      color: var(--primary-color);
    }

    nav a.active {
      color: var(--primary-color);
    }

    nav a::before {
      content: "";
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: 0;
      left: 0;
      background-color: var(--primary-color);
      transition: width 0.3s ease;
    }

    nav a:hover::before {
      width: 100%;
    }

    .container {
      background-color: var(--card-background);
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 8px var(--shadow-color);
      margin: 50px auto;
      text-align: center;
      width: 80%;
      max-width: 1200px;
    }

    h1 {
      color: var(--primary-color);
      margin-bottom: 20px;
    }

    #productsContainer {
      display: grid;

    .product-card {
      border: 1px solid var(--card-border);

      display: flex;
      align-items: center;

    }

    .publisher-image {
      width: 40px;
      height: 40px;

      font-weight: 600;

    .search-box {

    .filter-group select,

      padding: 8px;
      border: 1px solid #ced4da;
      border-radius: 5px;
      box-shadow: 0px 2px 4px var(--shadow-color);
    }

    .type-indicator {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 5px 10px;
      border-radius: 20px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      z-index: 1;
      box-shadow: 0px 2px 4px var(--shadow-color);
    }

    .type-indicator.free {
      background-color: #28a745;
    }

    .type-indicator.paid {
      background-color: #ffc107;
    }

    .info-dialog {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80%;
      max-width: 500px;
      background-color: var(--card-background);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 4px 8px var(--shadow-color);
      text-align: left;
      z-index: 10;
    }

    .dialog-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 9;
    }

    .info-dialog h3 {
      color: var(--primary-color);
      margin-bottom: 10px;
    }

    .info-dialog p {
      color: var(--text-color);
      margin-bottom: 15px;
    }

    .info-dialog button {
      background-color: var(--primary-color);
      color: #ffffff;
      border: none;
      padding: 10px 15px;
      border-radius: 5px;
      cursor: pointer;
      font-family: inherit;
      transition: background-color 0.3s ease;
    }

    .info-dialog button:hover {
      background-color: darken(var(--primary-color), 10%);
    }

    .theme-switcher {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
    }

    .theme-switcher label {
      margin-right: 10px;
      color: var(--text-color);
    }

    .theme-switcher input[type="checkbox"] {
      appearance: none;
      width: 40px;
      height: 20px;
      background: #ccc;
      border-radius: 20px;
      position: relative;
      cursor: pointer;
    }

    .theme-switcher input:checked {
      background: var(--primary-color);
    }

    .theme-switcher input:before {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }

    .theme-switcher input:checked:before {
      transform: translateX(20px);
    }

    footer {
      background-color: var(--footer-background); 
      text-align: center;
      padding: 20px 0;
      margin-top: 50px; 
      width: 100%;
    }

    footer p { 
      color: white;
    }

    .auth-buttons {
      display: flex;
      align-items: center;
      margin-top: 10px;
    }

    .auth-buttons button {
      margin-top: 50px; 
      padding: 8px 15px;
      background-color: var(--secondary-color);
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      width: auto;
    }

    .auth-buttons button:hover {
      background-color: white;
      color: black;
    }

    }

    .read-more {
      color: var(--primary-color);
      cursor: pointer;
      margin-top: 5px;
      text-align: left;
    }

    /* Signup Dialog Styles */
    .signup-dialog {
      display: none;
      position: fixed;
      left: 50%;
      top: 50%;

      background-color: white;

      z-index: 100;
    }

    .dialog-overlay { 
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 99; 
    }

    .signup-dialog h2 {
      margin-top: 0;
      text-align: center;
    }

    .signup-dialog button {
      display: block; 
      margin: 20px auto; 
      padding: 10px 20px;
      border: none;

      color: white;
      cursor: pointer;
    }

    .signup-dialog button:hover {
      background-color: #357ae8; /* Darker shade of blue on hover */
    }

    /* User Card Styles */
    .user-card {
      background-color: var(--card-background);

      border-radius: 8px;

    .user-card img {
      width: 100px;

      border-radius: 50%;
      object-fit: cover;
    }

    .user-card h3 {
      margin-top: 10px;
    }

    #googleSignInButton {
      width: 100%; 
    }

      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); /* Responsive grid */

<body>
  <header>
    <div class="header-content">

      <nav>

      </nav>

  </header>

  <div class="theme-switcher">
    <label for="themeToggle">Dark Mode</label>
    <input type="checkbox" id="themeToggle">
  </div>

  <div class="dialog-overlay" id="dialogOverlay"></div>
  <div class="signup-dialog" id="signupDialog">
    <h2>Sign Up with Google</h2>
    <button id="googleSignInButton">
        <span class="material-icons">account_circle</span> 
        Sign Up with Google
    </button>
  </div>

  <div class="container">
    <div id="userCard"></div> 
    <div class="search-and-filters">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search products...">
      </div>
      <div class="filter-group">
        <label for="typeFilter">Type:</label>
        <select id="typeFilter">
          <option value="all">All</option>
          <option value="free">Free</option>
          <option value="paid">Paid</option>
        </select>
      </div>
      <div class="filter-group" id="priceFilterGroup" style="display: none;">
        <label for="minPrice">Min Price:</label>
        <input type="number" id="minPrice" min="0" step="0.01">
        <label for="maxPrice">Max Price:</label>
        <input type="number" id="maxPrice" min="0" step="0.01">
      </div>
    </div>
    <div id="productsContainer">
      <div class="loading-animation">
        <div class="dot1"></div>
        <div class="dot2"></div>
        <div class="dot3"></div>
      </div>
    </div>
    <div class="info-dialog" id="infoDialog">
        <h3 id="dialogTitle"></h3>
        <p id="dialogDescription"></p>
        <button id="closeDialog">Close</button>
    </div>
  </div>
  <footer>
    <p>About Us - We are a company dedicated to providing high-quality extensions.</p>
    <p>© 2023 Extensions Lake. All rights reserved.</p>
  </footer>

  <script type="module"> 
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-analytics.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup } from 'https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCgy_AToJkB7iIkAf8A9yKYLGRcn6q3DGc",
      authDomain: "mypro-f9c43.firebaseapp.com",
      databaseURL: "https://mypro-f9c43-default-rtdb.firebaseio.com",
      projectId: "mypro-f9c43",
      storageBucket: "mypro-f9c43.appspot.com",
      messagingSenderId: "457342163754",
      appId: "1:457342163754:web:9f428caeea9ad5c5d11c53",
      measurementId: "G-YS7GD676WC"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app); 

    const productsContainer = document.getElementById("productsContainer");
    const searchInput = document.getElementById("searchInput");
    const infoDialog = document.getElementById("infoDialog");
    const dialogTitle = document.getElementById("dialogTitle");
    const dialogDescription = document.getElementById("dialogDescription");
    const closeDialogButton = document.getElementById("closeDialog");
    const dialogOverlay = document.getElementById('dialogOverlay');
    const themeToggle = document.getElementById('themeToggle');
    const typeFilter = document.getElementById('typeFilter');
    const priceFilterGroup = document.getElementById('priceFilterGroup');
    const minPriceInput = document.getElementById('minPrice');
    const maxPriceInput = document.getElementById('maxPrice');
    const databaseURL = "https://mypro-f9c43-default-rtdb.firebaseio.com/"; 
    const apiKey = "AIzaSyBfDYW18AJSfb03Cm_lR-SCZpTbcnLH1Qk"; 
    const signInBtn = document.getElementById("signInBtn");
    const signUpBtn = document.getElementById("signUpBtn");
    const authButtons = document.getElementById("authButtons"); 
    const signupDialog = document.getElementById("signupDialog");
    const userCard = document.getElementById("userCard");
    let allProducts = [];
    const maxDescriptionLength = 150;
    let currentUser = null; 

    function fetchProducts() {
      fetch(`${databaseURL}/.json?auth=${apiKey}`)
        .then(response => {
          if (!response.ok) {
            throw new Error('Network response was not ok');
          }
          return response.json();
        })
        .then(data => {
          allProducts = Object.values(data);
          displayProducts(allProducts);
        })
        .catch(error => {
          console.error('There has been a problem with your fetch operation:', error);
          productsContainer.innerHTML = '<p>Error loading products. Please try again later.</p>';
        });
    }

    function displayProducts(productsToDisplay) {
      productsContainer.innerHTML = '';
      productsToDisplay.forEach((product, index) => {
        let buttonText = product.type === "paid" ? "Buy Now" : "Download Now";
        let buttonUrl = product.type === "paid" ? product.paymentUrl : product.paymentUrl;
        let verifiedIcon = product.isVerified 
            ? `<span class="material-icons verified-icon">verified</span>` 
            : ''; 
        let imageElement = document.createElement(product.coverImageURL.endsWith('.gif') ? 'img' : 'img');         imageElement.src = product.coverImageURL;
        imageElement.alt = `${product.name} Cover`;
        let extensionImageContainer = document.createElement('div');
        extensionImageContainer.classList.add('extension-image');
        extensionImageContainer.appendChild(imageElement);
        const truncatedDescription = truncateDescription(product.description, maxDescriptionLength);
        const productCard = `
          <div class="product-card" data-type="${product.type}" style="background-color: var(--card-bg-${(index % 20) + 1});">
            <div class="type-indicator ${product.type}" data-type="${product.type}">${product.type.toUpperCase()}</div>
            <div class="publisher-info">
              <img class="publisher-image" src="${product.publisherImageURL}" alt="Publisher Image">
              <div>
                <span class="publisher-name">${product.publisherName} ${verifiedIcon}</span>
                <p class="publish-date">${product.date}</p>
              </div>
            </div>
            ${extensionImageContainer.outerHTML} 
            <h2>${product.name}</h2>
            <div class="description-container">
              <p class="description-text">${truncatedDescription}</p>
              <span class="read-more" style="color: var(--primary-color); cursor: pointer;" onclick="showFullDescription(this)">Read More</span>
            </div>
            <p>Price: $${product.price.toFixed(2)}</p>
            <div class="button-group">
              <a href="${buttonUrl}" target="_blank">
                <button>${buttonText}</button>
              </a>
              <a href="${product.topicURL}" target="_blank">
                <button style="background-color: #FF9843;">Visit Official Topic</button> 
              </a>
            </div>
          </div>
        `;
        productsContainer.innerHTML += productCard;
      });
      const typeIndicators = document.querySelectorAll('.type-indicator');
      typeIndicators.forEach(indicator => {
        indicator.addEventListener('click', showInfoDialog);
      });
      const descriptionTexts = document.querySelectorAll('.description-text');
      descriptionTexts.forEach(textElement => {
        textElement.innerHTML = truncateDescription(textElement.textContent, maxDescriptionLength);
      });
    }

    function showInfoDialog(event) {
      const type = event.target.dataset.type;
      let dialogTitle, dialogMessage;
      if (type === 'free') {
        dialogTitle = 'Free Product';
        dialogMessage = 'This product is free! You can download it directly by clicking "Download Now."';
      } else if (type === 'paid') {
        dialogTitle = 'Paid Product';
        dialogMessage = 'This product is paid. Please proceed to checkout to make a purchase.';
      }
      infoDialog.querySelector('h3').textContent = dialogTitle;
      infoDialog.querySelector('p').textContent = dialogMessage;
      infoDialog.style.display = 'block';
      dialogOverlay.style.display = 'block';
    }

    closeDialogButton.addEventListener('click', () => {
      infoDialog.style.display = 'none';
      dialogOverlay.style.display = 'none';
    });

    dialogOverlay.addEventListener('click', () => {
      signupDialog.style.display = "none"; 
      infoDialog.style.display = 'none';
      dialogOverlay.style.display = 'none'; 
    });

    function showFullDescription(element) {
      const card = element.closest('.product-card');
      const productName = card.querySelector('h2').textContent;
      const fullDescription = allProducts.find(p => p.name === productName).description;
      dialogTitle.textContent = productName;
      dialogDescription.textContent = fullDescription;
      infoDialog.style.display = 'block';
      dialogOverlay.style.display = 'block';
    }

    function truncateDescription(description, maxLength) {
      if (description.length > maxLength) {
        return description.substring(0, maxLength) + '... ';
      }
      return description;
    }

    fetchProducts(); 

    searchInput.addEventListener("input", () => {
      applyFilters(); 
    });

    typeFilter.addEventListener('change', () => {
      priceFilterGroup.style.display = (typeFilter.value === 'paid') ? 'flex' : 'none';
      applyFilters(); 
    });

    minPriceInput.addEventListener('input', applyFilters);
    maxPriceInput.addEventListener('input', applyFilters);

    function applyFilters() {
      const searchTerm = searchInput.value.toLowerCase();
      const selectedType = typeFilter.value;
      const minPrice = parseFloat(minPriceInput.value) || 0; 
      const maxPrice = parseFloat(maxPriceInput.value) || Infinity; 

      const filteredProducts = allProducts.filter(product => {
        const matchesType = selectedType === 'all' || product.type === selectedType;
        const matchesPrice = product.price >= minPrice && product.price <= maxPrice;
        const matchesSearch = product.name.toLowerCase().includes(searchTerm) || 
               product.description.toLowerCase().includes(searchTerm);
        return matchesType && matchesPrice && matchesSearch;
      });

      displayProducts(filteredProducts);
    }

    themeToggle.addEventListener('change', () => {
      document.body.classList.toggle('dark-theme', themeToggle.checked);

      if (themeToggle.checked) {
        document.documentElement.style.setProperty('--footer-background', '#343a40');
        document.documentElement.style.setProperty('--footer-text', 'white');
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.style.setProperty('--footer-background', 'black');
        document.documentElement.style.setProperty('--footer-text', 'white');
        localStorage.setItem('theme', 'light');
      }
    });

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-theme');
      themeToggle.checked = true; 
    }

    signInBtn.addEventListener("click", () => {
      signupDialog.style.display = "block";
      dialogOverlay.style.display = "block";
    });

    signUpBtn.addEventListener("click", () => {
      signupDialog.style.display = "block";
      dialogOverlay.style.display = "block";
    });

    const googleSignInButton = document.getElementById('googleSignInButton');
    googleSignInButton.addEventListener('click', () => {
      const provider = new GoogleAuthProvider();
      signInWithPopup(auth, provider)
        .then((result) => {
          currentUser = result.user;
          console.log("User signed in with Google:", currentUser);
          signupDialog.style.display = "none";
          dialogOverlay.style.display = "none";
          updateAuthDisplay();
        })
        .catch((error) => {
          console.error("Error signing in with Google:", error);
        });
    });

    function updateAuthDisplay() {
      if (currentUser) {
        authButtons.style.display = "none";
        userCard.innerHTML = `
          <div class="user-card">
            <img src="${currentUser.photoURL || 'https://www.gravatar.com/avatar/00000000000000000000000000000000?d=mp&f=y'}" alt="User Profile Picture">
            <h3>${currentUser.displayName || currentUser.email.split('@')[0]}</h3>
            <p>${currentUser.email}</p>
          </div>
        `;
      } else {
        authButtons.style.display = "flex";
        userCard.innerHTML = "";
      }
    }

    updateAuthDisplay();

  </script>
</body>
</html>
