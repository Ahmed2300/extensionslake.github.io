<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Extensions Lake</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="icon" href="https://iili.io/JpYa2r7.png" type="image/png">
  <style>
    /* CSS styles */
    body {
      background-color: #f8f9fa;
      color: #343a40;
      font-family: 'Roboto', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: background-color 0.3s ease, color 0.3s ease;
      --primary-color: #007bff;
      --secondary-color: #FF9843;
      --background-color: #f8f9fa;
      --text-color: #343a40;
      --card-background: #ffffff;
      --card-border: #dee2e6;
      --shadow-color: rgba(0, 0, 0, 0.1);
      --footer-background: #343a40;
      --footer-text: white;
    }

    body.dark-theme {
      --background-color: #343a40;
      --text-color: #f8f9fa;
      --card-background: #21252b;
      --card-border: #343a40;
      --shadow-color: rgba(255, 255, 255, 0.1);
      --primary-color: #6FDCE3;
    }

    header {
      background-color: var(--background-color);
      padding: 20px 0;
      width: 100%;
      box-shadow: 0 2px 5px var(--shadow-color);
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .logo {
      display: flex;
      align-items: center;
    }

    .logo img {
      margin-right: 10px;
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
    }

    nav li {
      margin-left: 30px;
    }

    nav a {
      text-decoration: none;
      color: var(--text-color);
      font-weight: 500;
      transition: color 0.3s ease;
      position: relative;
      padding-bottom: 5px;
    }

    nav a:hover {
      color: var(--primary-color);
    }

    nav a.active {
      color: var(--primary-color);
    }

    nav a::before {
      content: "";
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: 0;
      left: 0;
      background-color: var(--primary-color);
      transition: width 0.3s ease;
    }

    nav a:hover::before {
      width: 100%;
    }

    .container {
      background-color: var(--card-background);
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 8px var(--shadow-color);
      margin: 50px auto;
      text-align: center;
      width: 80%;
      max-width: 1200px;
    }

    h1 {
      color: var(--primary-color);
      margin-bottom: 20px;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 300px;
      margin: 0 auto;
    }

    .auth-form label {
      margin-bottom: 5px;
      font-weight: bold;
    }

    .auth-form input {
      padding: 8px;
      border: 1px solid #ced4da;
      border-radius: 5px;
      margin-bottom: 15px;
      box-shadow: 0px 2px 4px var(--shadow-color);
    }

    .auth-form button {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      box-shadow: 0px 2px 4px var(--shadow-color);
    }

    .auth-form button:hover {
      background-color: darken(var(--primary-color), 10%);
    }

    .google-login {
      margin-top: 15px;
      width: 100%;
    }

    .google-login button {
      background-color: #4285F4;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s ease;
      box-shadow: 0px 2px 4px var(--shadow-color);
    }

    .google-login button:hover {
      background-color: darken(#4285F4, 10%);
    }

    .google-login .material-icons {
      margin-right: 5px;
    }

    footer {
      background-color: var(--footer-background);
      text-align: center;
      padding: 20px 0;
      margin-top: 50px;
      width: 100%;
    }

    footer p {
      color: var(--footer-text);
    }

    .theme-switcher {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      align-items: center;
    }

    .theme-switcher label {
      margin-right: 10px;
      color: var(--text-color);
    }

    .theme-switcher input[type="checkbox"] {
      appearance: none;
      width: 40px;
      height: 20px;
      background: #ccc;
      border-radius: 20px;
      position: relative;
      cursor: pointer;
    }

    .theme-switcher input:checked {
      background: var(--primary-color);
    }

    .theme-switcher input:before {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 16px;
      height: 16px;
      background: #fff;
      border-radius: 50%;
      transition: 0.3s;
    }

    .theme-switcher input:checked:before {
      transform: translateX(20px);
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <div class="logo">
        <img src="https://iili.io/JpY7UV2.md.png" width="40px" alt="Logo">
        <h1>Extensions Lake</h1>
      </div>
      <nav>
        <ul>
          <li><a href="ExtensionlakeProj.html">Home</a></li>
          <li><a href="#">Products</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contacts.html">Contact</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <div class="theme-switcher">
    <label for="themeToggle">Dark Mode</label>
    <input type="checkbox" id="themeToggle">
  </div>

  <div class="container">
    <h1>Sign Up</h1>

    <div class="auth-form">
      <label for="email">Email:</label>
      <input type="email" id="email" required>

      <label for="password">Password:</label>
      <input type="password" id="password" required>

      <button id="signUpBtn">Sign Up</button>
    </div>

    <div class="google-login">
      <button id="googleSignInBtn">
        <span class="material-icons">account_circle</span>
        Sign Up with Google
      </button>
    </div>

  </div>

  <footer>
    <p>About Us - We are a company dedicated to providing high-quality extensions.</p>
    <p>© 2023 Extensions Lake. All rights reserved.</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script>
    // Your web app's Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCgy_AToJkB7iIkAf8A9yKYLGRcn6q3DGc",
      authDomain: "mypro-f9c43.firebaseapp.com",
      databaseURL: "https://mypro-f9c43-default-rtdb.firebaseio.com",
      projectId: "mypro-f9c43",
      storageBucket: "mypro-f9c43.appspot.com",
      messagingSenderId: "457342163754",
      appId: "1:457342163754:web:9f428caeea9ad5c5d11c53",
      measurementId: "G-YS7GD676WC"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Handle Sign Up button click
    const signUpBtn = document.getElementById("signUpBtn");
    signUpBtn.addEventListener('click', () => {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          console.log("User created:", user);
        })
        .catch((error) => {
          const errorCode = error.code;
          const errorMessage = error.message;
          console.error("Error creating user:", errorCode, errorMessage);
        });
    });

    // Handle Sign Up with Google button click
    const googleSignInBtn = document.getElementById('googleSignInBtn');
    googleSignInBtn.addEventListener('click', () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then((result) => {
          const user = result.user;
          console.log("Signed in with Google:", user);
          window.location.href = "ExtensionlakeProj.html";
        })
        .catch((error) => {
          const errorCode = error.code;
          const errorMessage = error.message;
          const email = error.email;
          const credential = error.credential;
          console.error("Error signing in with Google:", errorCode, errorMessage);
        });
    });

    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('change', () => {
      document.body.classList.toggle('dark-theme', themeToggle.checked);
      if (themeToggle.checked) {
        document.documentElement.style.setProperty('--footer-background', '#343a40');
        document.documentElement.style.setProperty('--footer-text', 'white');
        localStorage.setItem('theme', 'dark');
      } else {
        document.documentElement.style.setProperty('--footer-background', 'black');
        document.documentElement.style.setProperty('--footer-text', 'white');
        localStorage.setItem('theme', 'light');
      }
    });

    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'dark') {
      document.body.classList.add('dark-theme');
      themeToggle.checked = true;
    }
  </script>
</body>
</html>
